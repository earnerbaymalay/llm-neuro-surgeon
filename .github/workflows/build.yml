name: Desktop build (WIP)

# Cross-platform build matrix for the Tauri desktop app, mirroring the
# Phase 2 success criterion in MASTER_PROMPT.md ("empty app launches on all
# 3 OSes"). It is intentionally manual-only (workflow_dispatch) because the
# app does not yet compile end-to-end: it is missing a `build.rs`, a
# `tauri.conf.json`, and the React/TS frontend that `generate_context!`
# embeds. Once those land (Phase 2, tasks T2.1–T2.2), flip the triggers
# below to `push`/`pull_request` to make this a required gate.
#
# See docs/CODE_REVIEW.md for the full list of blockers.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.toml') }}

      # Tauri 1.x system dependencies (Linux only).
      - name: Install Linux WebKit deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl wget file libssl-dev

      - name: cargo build
        working-directory: apps/desktop/src-tauri
        run: cargo build --verbose
