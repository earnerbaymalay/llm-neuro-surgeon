[package]
name = "neurosurgeon-core"
version = "0.1.0"
edition = "2021"
description = "Canonical Brain model, scanner, adapter trait, projector, and sync engine shared by the desktop app and CLI"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
hex = "0.4"
toml = "0.8"

[dev-dependencies]
tempfile = "3"
