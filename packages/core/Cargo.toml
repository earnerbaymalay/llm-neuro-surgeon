[package]
name = "neurosurgeon-core"
version = "0.1.0"
edition = "2021"
description = "Canonical Brain model, scanner, adapter trait, projector, and sync engine shared by the desktop app and CLI"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
hex = "0.4"
toml = "0.8"
notify = "6"
diffy = "0.4"
ureq = { version = "2", features = ["json"] }
base64 = "0.22"
# One dependency, real keychain on all 3 OSes: Secret Service via DBus on
# Linux, Security.framework on macOS, Credential Manager on Windows.
# Optional because headless CI has no unlocked keyring to talk to —
# everything secrets-related tests against the fixture store by default.
keyring = { version = "3", features = ["sync-secret-service", "apple-native", "windows-native"], optional = true }

[features]
os-keychain = ["dep:keyring"]

[dev-dependencies]
tempfile = "3"
